# Per-transfer metrics for the streaming download endpoint.
#
# Emitted by StreamingDownloadWebScript: one line per completed transfer
# (bytes / duration / throughput / file-store-vs-fallback path / active count),
# and a WARN on client abort (broken pipe). INFO by default so the metrics are
# visible out of the box; set to WARN to keep only aborts, or OFF to silence.
logger.adf-downloadmanager-metrics.name=org.alfresco.downloadmanager.metrics
logger.adf-downloadmanager-metrics.level=info
